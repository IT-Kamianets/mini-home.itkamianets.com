name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build -- --configuration=production

      # Виправляємо проблему 404 помилки та створюємо CNAME
      - name: Fix routing and CNAME
        run: |
          cp dist/mini-home-hote/browser/index.html dist/mini-home-hote/browser/404.html
          echo "mini-home.itkamianets.com" > dist/mini-home-hote/browser/CNAME

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/mini-home-hote/browser
          branch: gh-pages
          clean: true
