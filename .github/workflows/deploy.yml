name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create 404.html for SPA
        run: cp dist/mini-home-hote/browser/index.html dist/mini-home-hote/browser/404.html

      - name: Copy CNAME to dist
        run: cp src/CNAME dist/mini-home-hote/browser/CNAME

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/mini-home-hote/browser
          branch: gh-pages
          clean: true
