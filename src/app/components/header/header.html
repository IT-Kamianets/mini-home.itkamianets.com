<!-- Mobile Topbar -->
<div class="mobile-topbar d-md-none">
  <div class="container d-flex">
    <a routerLink="/" class="logo">Mini <span>Home</span></a>
    
    <div class="topbar-actions">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode ? 'Light Mode' : 'Dark Mode'">
        <i class="bi" [ngClass]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
      </button>
      
      <div class="mobile-socials">
        <a href="tel:+380970010332"><i class="bi bi-telephone"></i></a>
      </div>

      <select class="lang-switcher" (change)="onLangChange($event)" [value]="currentLang()">
        <option value="uk">UA</option>
        <option value="en">EN</option>
        <option value="pl">PL</option>
        <option value="de">DE</option>
      </select>
    </div>
  </div>
</div>

<!-- Desktop Header & Mobile Bottom Nav -->
<header class="main-nav">
  <div class="container d-flex">
    <!-- Desktop Logo -->
    <a routerLink="/" class="logo d-none d-md-block">Mini <span>Home</span></a>

    <nav class="menu">
      <!-- Desktop only Home link -->
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="d-none d-md-block">
        <i class="bi bi-house d-md-none"></i>
        <span>{{ labels['home'][currentLang()] }}</span>
      </a>

      <!-- Shared links -->
      <a routerLink="/rooms" routerLinkActive="active">
        <i class="bi bi-door-open d-md-none"></i>
        <span>{{ labels['rooms'][currentLang()] }}</span>
      </a>
      <a routerLink="/gallery" routerLinkActive="active">
        <i class="bi bi-images d-md-none"></i>
        <span>{{ labels['gallery'][currentLang()] }}</span>
      </a>
      <a routerLink="/contact" routerLinkActive="active">
        <i class="bi bi-chat-dots d-md-none"></i>
        <span>{{ labels['contact'][currentLang()] }}</span>
      </a>

      <!-- Desktop extra items -->
      <div class="desktop-extras d-none d-md-flex">
        <button class="theme-toggle" (click)="toggleTheme()">
          <i class="bi" [ngClass]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
        </button>

        <select class="lang-switcher" (change)="onLangChange($event)" [value]="currentLang()">
          <option value="uk">UA</option>
          <option value="en">EN</option>
          <option value="pl">PL</option>
          <option value="de">DE</option>
        </select>
      </div>
    </nav>

    <!-- Desktop Book Button -->
    <div class="header-actions d-none d-md-block">
      <a routerLink="/contact" class="btn-book">{{ labels['book'][currentLang()] }}</a>
    </div>
  </div>
</header>
